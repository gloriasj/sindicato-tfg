# =====================================================
# nginx.conf - Configuración para SPA con React Router
# =====================================================
# Las aplicaciones SPA tienen un único index.html y la
# navegación interna la gestiona React Router en el
# cliente. Por defecto, si el usuario refresca en una
# ruta como /afiliados, Nginx busca un archivo físico
# con ese nombre y devuelve 404.
#
# La directiva 'try_files' resuelve el problema: si no
# encuentra el archivo, devuelve siempre /index.html
# para que React Router haga su trabajo.
# =====================================================

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Activar compresión gzip para servir archivos más rápido
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Cabeceras de seguridad básicas
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Caché agresivo para assets con hash en el nombre
  # (Vite los genera con hash, así que cambiar el archivo
  #  cambia su nombre y rompe el caché correctamente)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Resto de rutas: intenta servir el archivo físico,
  # si no existe, devuelve index.html para que React
  # Router maneje la ruta en el cliente.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
