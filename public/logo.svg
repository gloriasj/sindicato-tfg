  <!-- Cuerdas izquierda -->
  <line x1="22" y1="28" x2="22" y2="33" stroke="#f1880d" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="28" x2="18" y2="33" stroke="#f1880d" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="28" x2="26" y2="33" stroke="#f1880d" stroke-width="1.2" stroke-linecap="round"/>

