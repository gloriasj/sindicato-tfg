  <line x1="42" y1="28" x2="38" y2="33" stroke="#f1880d" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="28" x2="46" y2="33" stroke="#f1880d" stroke-width="1.2" stroke-linecap="round"/>

